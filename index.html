<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards — SPIN ABA</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#fdf4ff;min-height:100vh;padding:1.5rem 1rem 3rem;}
#jj{max-width:660px;margin:0 auto;}

.banner{
  background:#fff0f5;border-radius:20px;border:3px solid #f9c8de;
  padding:18px 20px 14px;margin-bottom:18px;text-align:center;position:relative;overflow:hidden;
}
.banner::before,.banner::after{
  content:'';position:absolute;width:60px;height:60px;border-radius:50%;
  background:#fde8f2;top:-20px;
}
.banner::before{left:-20px;}
.banner::after{right:-20px;}
.banner-title{font-size:26px;font-weight:900;color:#c9396e;letter-spacing:-0.5px;}
.banner-sub{font-size:14px;font-weight:700;color:#e8739a;margin-top:3px;}
.stars-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;}
.star-pip{font-size:24px;transition:transform .2s;}
@keyframes popstar{0%{transform:scale(1)}50%{transform:scale(1.6)}100%{transform:scale(1)}}
.star-pip.pop{animation:popstar .3s ease;}

.puzzle-tabs{display:flex;gap:0;margin-bottom:20px;border-radius:16px;overflow:hidden;border:3px solid #e0d6f5;}
.ptab{
  flex:1;padding:10px 6px 8px;border:none;cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:900;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:background .15s,transform .12s;position:relative;
  background:#f5f0ff;color:#7c6aad;
}
.ptab:not(:last-child){border-right:3px solid #e0d6f5;}
.ptab:hover{background:#ede5ff;}
.ptab.active{transform:translateY(-3px);z-index:2;border-radius:12px 12px 0 0;}
.ptab[data-k="when"].active  {background:#fff3e0;color:#e07b00;box-shadow:0 -3px 0 3px #e07b00;}
.ptab[data-k="who"].active   {background:#e8f5e9;color:#2e7d32;box-shadow:0 -3px 0 3px #2e7d32;}
.ptab[data-k="what"].active  {background:#fce4ec;color:#c2185b;box-shadow:0 -3px 0 3px #c2185b;}
.ptab[data-k="where"].active {background:#e3f2fd;color:#1565c0;box-shadow:0 -3px 0 3px #1565c0;}
.ptab[data-k="social"].active{background:#f3e5f5;color:#7b1fa2;box-shadow:0 -3px 0 3px #7b1fa2;}
.ptab-icon{font-size:22px;line-height:1;}
.ptab-lbl{font-size:11px;line-height:1.2;text-align:center;}

.deck{display:none;}
.deck.vis{display:block;}

.progress-track{height:14px;background:#f0eaf8;border-radius:8px;margin-bottom:16px;border:2px solid #e0d5f0;overflow:hidden;}
.progress-fill{height:100%;border-radius:6px;transition:width .4s cubic-bezier(.34,1.56,.64,1);}
.deck[data-k="when"]  .progress-fill{background:linear-gradient(90deg,#ffb74d,#ffa000);}
.deck[data-k="who"]   .progress-fill{background:linear-gradient(90deg,#66bb6a,#388e3c);}
.deck[data-k="what"]  .progress-fill{background:linear-gradient(90deg,#f06292,#c2185b);}
.deck[data-k="where"] .progress-fill{background:linear-gradient(90deg,#64b5f6,#1565c0);}
.deck[data-k="social"].progress-fill{background:linear-gradient(90deg,#ce93d8,#7b1fa2);}

.card-wrap{perspective:1000px;height:220px;margin-bottom:16px;cursor:pointer;user-select:none;}
.card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,.2,.2,1);}
.card-inner.flipped{transform:rotateY(180deg);}
.card-face{
  position:absolute;inset:0;backface-visibility:hidden;
  border-radius:22px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:20px 24px;gap:8px;
  border:3px solid transparent;
}
.card-back{transform:rotateY(180deg);}
.deck[data-k="when"]  .card-front{border-color:#ffcc80;background:#fffde7;}
.deck[data-k="when"]  .card-back {border-color:#ffb74d;background:#fff8e1;}
.deck[data-k="who"]   .card-front{border-color:#a5d6a7;background:#f1f8e9;}
.deck[data-k="who"]   .card-back {border-color:#66bb6a;background:#e8f5e9;}
.deck[data-k="what"]  .card-front{border-color:#f48fb1;background:#fce4ec;}
.deck[data-k="what"]  .card-back {border-color:#f06292;background:#fce4ec;}
.deck[data-k="where"] .card-front{border-color:#90caf9;background:#e3f2fd;}
.deck[data-k="where"] .card-back {border-color:#64b5f6;background:#e8f4fd;}
.deck[data-k="social"].card-front{border-color:#ce93d8;background:#f3e5f5;}
.deck[data-k="social"].card-back {border-color:#ba68c8;background:#f3e5f5;}

.puzzle-deco{position:absolute;top:10px;right:14px;width:28px;height:28px;opacity:.15;}
.card-badge{
  font-size:11px;font-weight:900;letter-spacing:.6px;text-transform:uppercase;
  padding:3px 10px;border-radius:20px;
}
.deck[data-k="when"]  .card-badge{background:#ffe0b2;color:#e65100;}
.deck[data-k="who"]   .card-badge{background:#c8e6c9;color:#1b5e20;}
.deck[data-k="what"]  .card-badge{background:#fce4ec;color:#880e4f;}
.deck[data-k="where"] .card-badge{background:#bbdefb;color:#0d47a1;}
.deck[data-k="social"].card-badge{background:#e1bee7;color:#4a148c;}

.card-q{font-size:18px;font-weight:900;text-align:center;line-height:1.35;color:#2a2040;}
.card-a{font-size:26px;font-weight:900;text-align:center;line-height:1.2;}
.deck[data-k="when"]  .card-a{color:#e07b00;}
.deck[data-k="who"]   .card-a{color:#2e7d32;}
.deck[data-k="what"]  .card-a{color:#c2185b;}
.deck[data-k="where"] .card-a{color:#1565c0;}
.deck[data-k="social"].card-a{color:#7b1fa2;}
.card-tap{font-size:12px;font-weight:700;color:#9a8ab8;display:flex;align-items:center;gap:4px;}
.card-counter{position:absolute;bottom:12px;right:16px;font-size:12px;font-weight:700;color:#b0a4cc;}

.btn-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;}
.jbtn{
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;
  padding:10px 22px;border-radius:50px;border:none;cursor:pointer;
  transition:transform .12s,opacity .12s;
  display:flex;align-items:center;gap:6px;
}
.jbtn:hover{transform:scale(1.05);}
.jbtn:active{transform:scale(0.95);}
.jbtn:disabled{opacity:.3;cursor:not-allowed;transform:none;}
.jbtn.ghost{background:#f0eaf8;color:#7c6aad;}
.deck[data-k="when"]  .jbtn.go{background:#ffa000;color:#fff;}
.deck[data-k="who"]   .jbtn.go{background:#388e3c;color:#fff;}
.deck[data-k="what"]  .jbtn.go{background:#c2185b;color:#fff;}
.deck[data-k="where"] .jbtn.go{background:#1565c0;color:#fff;}
.deck[data-k="social"].jbtn.go{background:#7b1fa2;color:#fff;}
.cnt-pill{
  font-size:13px;font-weight:900;padding:6px 16px;border-radius:20px;
  background:#f0eaf8;color:#7c6aad;min-width:60px;text-align:center;
}
.shuffle-btn{
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;
  padding:6px 14px;border-radius:20px;border:2px dashed #d4c8ee;
  background:transparent;cursor:pointer;color:#9c8abf;
  display:flex;align-items:center;gap:5px;transition:background .15s;
}
.shuffle-btn:hover{background:#f0eaf8;}

.done-wrap{
  border-radius:22px;padding:32px 20px;text-align:center;
  display:none;flex-direction:column;align-items:center;gap:10px;
  border:3px dashed #e0d5f0;background:#fff;
}
.done-wrap.show{display:flex;}
.done-big{font-size:52px;line-height:1;}
.done-h{font-size:22px;font-weight:900;color:#2a2040;}
.done-p{font-size:14px;font-weight:700;color:#7c6aad;}

.deck-meta{font-size:11px;font-weight:800;color:#b0a4cc;margin-bottom:8px;}
</style>
</head>
<body>
<div id="jj">
  <div class="banner">
    <div class="banner-title">Flashcards ✨</div>
    <div class="banner-sub">SPIN ABA Practice</div>
    <div class="stars-row" id="stars-row"></div>
  </div>
  <div class="puzzle-tabs" id="ptabs"></div>
  <div id="pdecks"></div>
</div>

<script>
const ICONS={when:'⏰',who:'🧑',what:'🔍',where:'📍',social:'💬'};
const DECKS={
  when:{label:'When',file:'JJ_SPIN-When_questions_-_Copy.docx',cards:[
    {q:'When do you take a bath?',a:'At night'},
    {q:'When do you ride your bike?',a:'Outside / nice weather'},
    {q:'When do you eat breakfast?',a:'In the morning'},
    {q:'When do you read a bedtime story?',a:'At night / before bed'},
    {q:'When do you turn the lights on?',a:"When it's dark"},
    {q:'When do you play outside?',a:'During the day'},
    {q:'When do you go to bed?',a:'At night'},
    {q:'When do you go swimming?',a:'In the summer'},
    {q:'When do you build a snowman?',a:'When it snows'},
    {q:'When do you make hot chocolate?',a:"When it's cold"},
    {q:'When do you grow flowers?',a:'In the spring'},
    {q:'When do you wear gloves?',a:"When it's cold"},
    {q:'When do you wear a coat?',a:"When it's cold"},
    {q:'When do you wash your hands?',a:'Before eating'},
    {q:'When do you eat?',a:"When you're hungry"},
    {q:'When do you sleep?',a:'At night'},
    {q:'When do you clap for someone?',a:'When they do great!'},
    {q:'When do you see the doctor?',a:"When you're sick"},
    {q:'When do you use goggles?',a:'When you swim'},
    {q:'When do you go trick or treating?',a:'On Halloween'},
    {q:'When do you eat turkey?',a:'On Thanksgiving'},
    {q:'When do you eat birthday cake?',a:'On a birthday'},
    {q:'When does Santa give presents?',a:'On Christmas'},
    {q:'When do you use an umbrella?',a:'When it rains'},
    {q:'When do you watch fireworks?',a:'On July 4th'},
  ]},
  who:{label:'Who',file:'JJ_SPIN-Who_Questions_-_Copy.docx',cards:[
    {q:'Who helps people when they are sick?',a:'A doctor'},
    {q:'Who puts out fires?',a:'A firefighter'},
    {q:'Who teaches children to read?',a:'A teacher'},
    {q:'Who takes care of zoo animals?',a:'A zookeeper'},
    {q:'Who takes care of sick animals?',a:'A vet'},
    {q:'Who flies an airplane?',a:'A pilot'},
    {q:'Who grows food for us to eat?',a:'A farmer'},
    {q:'Who delivers mail?',a:'A mail carrier'},
    {q:'Who checks and cleans teeth?',a:'A dentist'},
    {q:'Who builds things with wood?',a:'A carpenter'},
    {q:'Who paints pictures?',a:'An artist'},
    {q:'Who helps us when we get lost?',a:'A police officer'},
    {q:'Who brings food at a restaurant?',a:'A waiter'},
    {q:'Who makes cakes and cookies?',a:'A baker'},
    {q:'Who plays instruments?',a:'A musician'},
    {q:'Who fixes broken pipes?',a:'A plumber'},
  ]},
  what:{label:'What',file:'JJ_SPIN-What_Questions21_5-19.docx',cards:[
    {q:'What beeps?',a:'A car'},
    {q:'What animal meows?',a:'A cat'},
    {q:'What animal barks?',a:'A dog'},
    {q:'What animal roars?',a:'A lion'},
    {q:'What color is a banana?',a:'Yellow'},
    {q:'What color is grass?',a:'Green'},
    {q:'What color is the sky?',a:'Blue'},
    {q:'What shape is the sun?',a:'A circle'},
    {q:'What do you build with?',a:'Blocks'},
    {q:'What do you wear to bed?',a:'Pajamas'},
    {q:'What do you cut with?',a:'Scissors'},
    {q:'What do you drink with?',a:'A cup'},
    {q:'What do you talk on?',a:'A phone'},
    {q:'What do you wear on your head?',a:'A hat'},
    {q:'What do you color with?',a:'Crayons'},
    {q:'What do you write with?',a:'A pencil'},
    {q:'What do you sleep on?',a:'A bed'},
    {q:'What do you sit on?',a:'A chair'},
    {q:'What do you use when it rains?',a:'An umbrella'},
    {q:'What flies?',a:'A plane'},
    {q:'What do you read?',a:'A book'},
    {q:'What do you wear on your feet?',a:'Shoes'},
    {q:'What do you throw?',a:'A ball'},
    {q:'What do you eat with?',a:'A fork'},
    {q:'What sails?',a:'A boat'},
  ]},
  where:{label:'Where',file:'JJ_SPIN-Where_Questions_5-19__1_.docx',cards:[
    {q:'Where do you go to learn?',a:'School'},
    {q:'Where do you see trees?',a:'Outside / the park'},
    {q:'Where do you go when sick?',a:'The doctor'},
    {q:'Where do you buy food?',a:'The grocery store'},
    {q:'Where do you go to swim?',a:'The pool'},
    {q:'Where do you go to read books?',a:'The library'},
    {q:'Where do you go to swing?',a:'The playground'},
    {q:'Where do fish live?',a:'In the ocean'},
    {q:'Where do birds live?',a:'In a nest'},
    {q:'Where do pigs live?',a:'On a farm'},
    {q:'Where do you sleep?',a:'In your bed'},
    {q:'Where do plants grow?',a:'In the ground'},
    {q:'Where does a king live?',a:'In a castle'},
    {q:'Where do you see monkeys and lions?',a:'The zoo'},
    {q:'Where do you keep cold food?',a:'The refrigerator'},
    {q:'Where do you cook food?',a:'In the kitchen'},
    {q:'Where do you take a bath?',a:'In the bathroom'},
    {q:'Where do you wash clothes?',a:'The laundry room'},
    {q:'Where do you sit?',a:'On a chair'},
    {q:'Where do animals go when sick?',a:'The vet'},
    {q:'Where do you see clouds?',a:'In the sky'},
    {q:'Where do you brush your teeth?',a:'In the bathroom'},
    {q:'Where do you like to play?',a:'The playground'},
    {q:'Where do you live?',a:'At home'},
    {q:'Where do you like to eat?',a:'A restaurant'},
    {q:'Where do you go to school?',a:'SPIN'},
  ]},
  social:{label:'Social',file:'Social_Questions_5-19.docx',cards:[
    {q:'What is your name?',a:'My name'},
    {q:'How old are you?',a:'My age'},
    {q:'What street do you live on?',a:'My street'},
    {q:'Where do you go to school?',a:'SPIN'},
    {q:"What is your mom's name?",a:"Mom's name"},
    {q:"What is your dad's name?",a:"Dad's name"},
    {q:'What color is your hair?',a:'My hair color'},
    {q:'What color are your eyes?',a:'My eye color'},
    {q:'What city do you live in?',a:'My city'},
    {q:"What's your phone number?",a:'My phone number'},
    {q:"What's your teacher's name?",a:"My teacher's name"},
    {q:"What's your favorite food?",a:'My favorite food'},
    {q:"What's your favorite show?",a:'My favorite show'},
    {q:"What's your favorite movie?",a:'My favorite movie'},
    {q:'What do you like to play with?',a:'My favorite toy'},
    {q:'Who is your friend?',a:"My friend's name"},
    {q:"What's your address?",a:'My address'},
    {q:'When is your birthday?',a:'My birthday'},
  ]},
};

const keys=Object.keys(DECKS);
const state={};
let totalStars=0;
keys.forEach(k=>{state[k]={idx:0,flipped:false,cards:[...DECKS[k].cards]};});

const starsRow=document.getElementById('stars-row');
const ptabs=document.getElementById('ptabs');
const pdecks=document.getElementById('pdecks');

function updateStars(){
  starsRow.innerHTML='';
  for(let i=0;i<5;i++){
    const s=document.createElement('span');
    s.className='star-pip';
    s.textContent=i<Math.ceil(totalStars/5)?'⭐':'☆';
    starsRow.appendChild(s);
  }
}
updateStars();

keys.forEach((k,idx)=>{
  const d=DECKS[k];

  const btn=document.createElement('button');
  btn.className='ptab'+(idx===0?' active':'');
  btn.dataset.k=k;
  btn.innerHTML=`<span class="ptab-icon">${ICONS[k]}</span><span class="ptab-lbl">${d.label}</span>`;
  btn.onclick=()=>{
    document.querySelectorAll('.ptab').forEach(b=>b.classList.toggle('active',b.dataset.k===k));
    document.querySelectorAll('.deck').forEach(dd=>dd.classList.toggle('vis',dd.dataset.k===k));
  };
  ptabs.appendChild(btn);

  const pct=Math.round(1/d.cards.length*100);
  const deck=document.createElement('div');
  deck.className='deck'+(idx===0?' vis':'');
  deck.dataset.k=k;
  deck.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <span class="deck-meta">${d.file} &mdash; ${d.cards.length} cards</span>
      <button class="shuffle-btn" onclick="doShuffle('${k}')">🔀 shuffle</button>
    </div>
    <div class="progress-track"><div class="progress-fill" id="pf-${k}" style="width:${pct}%"></div></div>
    <div class="card-wrap" id="cw-${k}" onclick="doFlip('${k}')">
      <div class="card-inner" id="ci-${k}">
        <div class="card-face card-front">
          <svg class="puzzle-deco" viewBox="0 0 40 40" aria-hidden="true">
            <path d="M10 10h8v-3a3 3 0 016 0v3h6v8h3a3 3 0 010 6h-3v6h-8v3a3 3 0 01-6 0v-3h-6v-6h-3a3 3 0 010-6h3z" fill="currentColor"/>
          </svg>
          <span class="card-badge" id="cb-${k}">card 1</span>
          <p class="card-q" id="cq-${k}"></p>
          <span class="card-tap">👆 tap to flip!</span>
          <span class="card-counter" id="cc-${k}"></span>
        </div>
        <div class="card-face card-back">
          <svg class="puzzle-deco" viewBox="0 0 40 40" aria-hidden="true">
            <path d="M10 10h8v-3a3 3 0 016 0v3h6v8h3a3 3 0 010 6h-3v6h-8v3a3 3 0 01-6 0v-3h-6v-6h-3a3 3 0 010-6h3z" fill="currentColor"/>
          </svg>
          <span class="card-badge">answer ⭐</span>
          <p class="card-a" id="ca-${k}"></p>
          <span class="card-counter" id="cc2-${k}"></span>
        </div>
      </div>
    </div>
    <div class="done-wrap" id="dw-${k}">
      <div class="done-big">🧩</div>
      <div class="done-h">Puzzle complete!</div>
      <div class="done-p">All ${d.cards.length} ${d.label} cards &mdash; amazing job!</div>
      <button class="jbtn go" onclick="doReset('${k}')" style="margin-top:8px">🔄 play again</button>
    </div>
    <div class="btn-row">
      <button class="jbtn ghost" id="bp-${k}" onclick="doPrev('${k}')" disabled>← back</button>
      <span class="cnt-pill" id="cp-${k}"></span>
      <button class="jbtn go" id="bn-${k}" onclick="doNext('${k}')">next →</button>
    </div>
  `;
  pdecks.appendChild(deck);
  render(k);
});

function render(k){
  const s=state[k],t=s.cards.length,i=s.idx,over=i>=t;
  document.getElementById(`cw-${k}`).style.display=over?'none':'';
  document.getElementById(`dw-${k}`).classList.toggle('show',over);
  if(over){
    document.getElementById(`bp-${k}`).disabled=true;
    document.getElementById(`bn-${k}`).disabled=true;
    document.getElementById(`cp-${k}`).textContent=t+' / '+t;
    document.getElementById(`pf-${k}`).style.width='100%';
    return;
  }
  const c=s.cards[i];
  document.getElementById(`cq-${k}`).textContent=c.q;
  document.getElementById(`ca-${k}`).textContent=c.a;
  document.getElementById(`cb-${k}`).textContent='card '+(i+1);
  const lbl=(i+1)+' / '+t;
  document.getElementById(`cc-${k}`).textContent=lbl;
  document.getElementById(`cc2-${k}`).textContent=lbl;
  document.getElementById(`cp-${k}`).textContent=lbl;
  document.getElementById(`bp-${k}`).disabled=i===0;
  document.getElementById(`bn-${k}`).disabled=false;
  document.getElementById(`pf-${k}`).style.width=Math.round(((i+1)/t)*100)+'%';
  document.getElementById(`ci-${k}`).classList.remove('flipped');
  s.flipped=false;
}
function doFlip(k){
  const s=state[k];s.flipped=!s.flipped;
  document.getElementById(`ci-${k}`).classList.toggle('flipped',s.flipped);
  if(s.flipped){totalStars=Math.min(totalStars+1,25);updateStars();}
}
function doNext(k){state[k].idx++;render(k);}
function doPrev(k){if(state[k].idx>0){state[k].idx--;render(k);}}
function doReset(k){state[k].idx=0;state[k].flipped=false;state[k].cards=[...DECKS[k].cards];render(k);}
function doShuffle(k){
  const c=state[k].cards;
  for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]];}
  state[k].idx=0;render(k);
}
</script>
</body>
</html>
